<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta property="og:title" content="프리미엄 무선 이어폰 Pro Max" />
  <meta property="og:description" content="노이즈 캔슬링, 30시간 배터리, IPX5 방수" />
  <title>Browser Platform Test Page</title>

<body>
  <nav class="breadcrumb">
    <ul><li>전자기기</li><li>이어폰</li><li>무선이어폰</li></ul>
  </nav>

  <h1 id="product-title" data-product-title="프리미엄 무선 이어폰 Pro Max">Product Test Page</h1>

  <div class="product-brand" data-brand="SoundMax">SoundMax</div>
  <div class="category" data-category="전자기기/이어폰">전자기기/이어폰</div>
  <div class="price product-price" data-price="89000" data-currency="KRW">89,000원</div>

    <span data-option-value="128GB">128GB</span>
    <span data-option-value="256GB">256GB</span>
  </div>

  <div class="shipping">
    <span class="shipping-method" data-shipping-method="CJ대한통운">CJ대한통운</span>
    <span class="shipping-fee" data-shipping-fee="3000">3,000원</span>

  </div>

  <a href="/details" role="link">View Details</a>
